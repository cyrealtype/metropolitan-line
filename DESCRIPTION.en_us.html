<p>Metropolitan Line is an open source version of Edward Johnston's Timeless Typeface for London Underground of 1916. Based on Railway Sans digitized by Justin Howes in 1994, and published by Greg Fleming in 2012.
</p>
<p>To contribute, see <a href="https://github.com/cyrealtype/metropolitan-line">github.com/cyrealtype/metropolitan-line</a>.</p>
